name: Build and publish OCI images

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]


jobs:
  # Generate build and merge matrices from images.json so each image is
  # defined in one place. Adding an image or arch requires only editing
  # images.json, not this workflow.
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrices.outputs.build_matrix }}
      merge_matrix: ${{ steps.matrices.outputs.merge_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate matrices
        id: matrices
        run: python3 .github/workflows/gen-matrix.py >> "$GITHUB_OUTPUT"


  build:
    needs: setup
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}

    permissions:
      contents: read
      packages: write
      # Required for keyless signing with sigstore/fulcio when not in a PR.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Some OS directories generate versioned Containerfiles from templates.
      - name: Generate versioned Containerfiles
        run: |
          if [ -f "${{ matrix.context }}/Makefile" ]; then
            make -C "${{ matrix.context }}"
          fi

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry
      # https://github.com/docker/login-action
      - name: Log into registry ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/warewulf-${{ matrix.os }}

      # Build single-platform image and push by content-addressed digest.
      # No tag is written here; the merge job assembles the manifest index.
      # https://github.com/docker/build-push-action
      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/warewulf-${{ matrix.os }},oci-mediatypes=true,push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.os }}-${{ matrix.version }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.os }}-${{ matrix.version }}-${{ matrix.platform }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.os }}-${{ matrix.version }}-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1


  # Combine per-arch digests into a multi-arch manifest index, then sign.
  # Skipped on pull requests — PRs validate builds only, never publish.
  merge:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: [setup, build]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.merge_matrix) }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.os }}-${{ matrix.version }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/warewulf-${{ matrix.os }}
          tags: |
            type=schedule
            type=raw,${{ matrix.version }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          mapfile -t tag_args < <(jq -cr '.tags[] | "-t", .' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          mapfile -t digest_args < <(printf 'ghcr.io/${{ github.repository_owner }}/warewulf-${{ matrix.os }}@sha256:%s\n' *)
          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"

      # Install the cosign tool
      # https://github.com/sigstore/cosign-installer
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # Sign the manifest index by digest — digests are immutable, tags are not.
      # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
      - name: Sign the manifest
        run: |
          image="ghcr.io/${{ github.repository_owner }}/warewulf-${{ matrix.os }}:${{ matrix.version }}"
          digest=$(docker buildx imagetools inspect "${image}" --format '{{.Manifest.Digest}}')
          cosign sign --yes "${image}@${digest}"
