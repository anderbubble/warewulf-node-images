name: Build and publish OCI images

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]


jobs:
  build:
    runs-on: ${{ matrix.arch.runner }}

    strategy:
      fail-fast: false
      matrix:
        arch:
          - {platform: linux/amd64, runner: ubuntu-latest,    platform_pair: linux-amd64}
          - {platform: linux/arm64, runner: ubuntu-24.04-arm, platform_pair: linux-arm64}
        image:
          - {os: rockylinux,  version: "8",      context: rockylinux-8,    file: rockylinux-8/Containerfile}
          - {os: rockylinux,  version: "8.9",    context: rockylinux-8,    file: rockylinux-8/Containerfile-8.9}
          - {os: rockylinux,  version: "8.10",   context: rockylinux-8,    file: rockylinux-8/Containerfile-8.10}
          - {os: rockylinux,  version: "9",      context: rockylinux-9,    file: rockylinux-9/Containerfile}
          - {os: rockylinux,  version: "9.7",    context: rockylinux-9,    file: rockylinux-9/Containerfile-9.7}
          - {os: rockylinux,  version: "9.8",    context: rockylinux-9,    file: rockylinux-9/Containerfile-9.8}
          - {os: rockylinux,  version: "10",     context: rockylinux-10,   file: rockylinux-10/Containerfile}
          - {os: rockylinux,  version: "10.1",   context: rockylinux-10,   file: rockylinux-10/Containerfile-10.1}
          - {os: rockylinux,  version: "10.2",   context: rockylinux-10,   file: rockylinux-10/Containerfile-10.2}
          - {os: almalinux,   version: "8",      context: almalinux-8,     file: almalinux-8/Containerfile}
          - {os: almalinux,   version: "8.9",    context: almalinux-8,     file: almalinux-8/Containerfile-8.9}
          - {os: almalinux,   version: "8.10",   context: almalinux-8,     file: almalinux-8/Containerfile-8.10}
          - {os: almalinux,   version: "9",      context: almalinux-9,     file: almalinux-9/Containerfile}
          - {os: almalinux,   version: "9.7",    context: almalinux-9,     file: almalinux-9/Containerfile-9.7}
          - {os: almalinux,   version: "9.8",    context: almalinux-9,     file: almalinux-9/Containerfile-9.8}
          - {os: almalinux,   version: "10",     context: almalinux-10,    file: almalinux-10/Containerfile}
          - {os: almalinux,   version: "10.1",   context: almalinux-10,    file: almalinux-10/Containerfile-10.1}
          - {os: almalinux,   version: "10.2",   context: almalinux-10,    file: almalinux-10/Containerfile-10.2}
          - {os: leap,        version: "15",     context: leap,            file: leap/Containerfile-15}
          - {os: leap,        version: "16",     context: leap,            file: leap/Containerfile-16.0}
          - {os: leap,        version: "16.0",   context: leap,            file: leap/Containerfile-16.0}
          - {os: tumbleweed,  version: "latest", context: tumbleweed,      file: tumbleweed/Containerfile}
          - {os: debian,      version: "12",     context: debian,          file: debian/Containerfile-12}
          - {os: debian,      version: "13",     context: debian,          file: debian/Containerfile-13}
          - {os: openeuler,   version: "24.03",  context: openeuler-24.03, file: openeuler-24.03/Containerfile}
          - {os: ubuntu,      version: "24.04",  context: ubuntu,          file: ubuntu/Containerfile-24.04}
          - {os: ubuntu,      version: "26.04",  context: ubuntu,          file: ubuntu/Containerfile-26.04}

    permissions:
      contents: read
      packages: write
      # Required for keyless signing with sigstore/fulcio when not in a PR.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Some OS directories generate versioned Containerfiles from templates.
      - name: Generate versioned Containerfiles
        run: |
          if [ -f "${{ matrix.image.context }}/Makefile" ]; then
            make -C "${{ matrix.image.context }}"
          fi

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry
      # https://github.com/docker/login-action
      - name: Log into registry ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/warewulf-${{ matrix.image.os }}

      # Build single-platform image and push by content-addressed digest.
      # No tag is written here; the merge job assembles the manifest index.
      # https://github.com/docker/build-push-action
      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          platforms: ${{ matrix.arch.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/warewulf-${{ matrix.image.os }},oci-mediatypes=true,push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.os }}-${{ matrix.image.version }}-${{ matrix.arch.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.os }}-${{ matrix.image.version }}-${{ matrix.arch.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${{ matrix.image.os }}:${{ matrix.image.version }}" > "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.os }}-${{ matrix.image.version }}-${{ matrix.arch.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1


  # Combine per-arch digests into a multi-arch manifest index, then sign.
  # On pull requests, logs the imagetools commands that would run without executing them.
  merge:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Install the cosign tool
      # https://github.com/sigstore/cosign-installer
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.5.0

      # Each digest file is named by its hash; its content is "{os}:{version}".
      # Group digests by image, create one manifest index per image, then sign.
      # On PRs, log the imagetools commands instead of running them.
      # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
      - name: Create manifest lists and sign
        run: |
          declare -A image_digests
          for f in /tmp/digests/*; do
            hash=$(basename "$f")
            read -r os_version < "$f"
            os="${os_version%%:*}"; version="${os_version#*:}"
            repo="ghcr.io/${{ github.repository_owner }}/warewulf-${os}"
            image_digests["${os}:${version}"]+=" ${repo}@sha256:${hash}"
          done

          for key in "${!image_digests[@]}"; do
            os="${key%%:*}"; version="${key#*:}"
            image="ghcr.io/${{ github.repository_owner }}/warewulf-${os}:${version}"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "[dry-run] docker buildx imagetools create -t ${image} ${image_digests[$key]}"
            else
              docker buildx imagetools create -t "${image}" ${image_digests["$key"]}
              digest=$(docker buildx imagetools inspect "${image}" --format '{{.Manifest.Digest}}')
              cosign sign --yes "${image}@${digest}"
            fi
          done
